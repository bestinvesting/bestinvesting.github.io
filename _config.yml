# -----------------------------
# 기본 정보
# -----------------------------
title: Welcome to Best Investor's Blog
author: Best Investor
email: misoinvesment@gmail.com
description: >
  Quant-based trading signals and market analysis.

url: "https://bestinvesting.github.io"
baseurl: ""

# -----------------------------
# 테마 및 빌드 설정
# -----------------------------
remote_theme: bestinvesting/jekyll-gitbook

include:
  - _a_posts
  - _b_pages
  - _c_others

# -----------------------------
# Markdown & Permalink
# -----------------------------
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

permalink: /:year-:month-:day-:title/

# -----------------------------
# TOC & Navigation
# -----------------------------
toc:
  enabled: true
  h_min: 1
  h_max: 3

navigation:
  collapse: true

# -----------------------------
# 플러그인 & 제외
# -----------------------------
plugins:
  - jekyll-remote-theme
  - jemoji

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _drafts

# -----------------------------
# Collections (매우 중요)
# -----------------------------
collections:
  a_posts:            
    output: true
    permalink: /:year/:month/:day/:title/
  b_pages:
    output: true
  c_others:
    output: true

# -----------------------------
# 기본값 설정 
# -----------------------------
defaults:
  - scope:
      path: "_a_posts"
    values:
      layout: default      # 중요: post 레이아웃은 사이드바에서 빠질 수 있음
      has_children: false
      nav_order: 10        # 자식들이 가질 기본 순서